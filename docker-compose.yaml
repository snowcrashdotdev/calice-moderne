services:
  nginx:
    image: nginx:stable-alpine
    depends_on:
      - sveltekit
      - fastapi
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - '9000:80'
  sveltekit:
    build: .
    ports:
      - 3000
    volumes:
      - ./:/app
      - /app/node_modules
  fastapi:
    build:
      dockerfile: api/Dockerfile
      context: .
      args:
        - "UID=${UID:-1000}"
        - "GID=${GID:-1000}"
    volumes:
      - ./:/app
    ports:
      - 8000