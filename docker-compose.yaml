services:
  mongo:
    image: mongo
    volumes:
      - /data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: calice
      MONGO_INITDB_ROOT_PASSWORD: calice
      MONGO_INITDB_DATABASE: calice
    ports:
      - 27017
  nginx:
    image: nginx:stable-alpine
    depends_on:
      - sveltekit
      - fastapi
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - '9000:80'
  sveltekit:
    build: .
    ports:
      - 3000
    volumes:
      - ./:/app
      - /app/node_modules
  fastapi:
    build:
      dockerfile: api/Dockerfile
      context: .
      args:
        - "UID=${UID:-1000}"
        - "GID=${GID:-1000}"
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: mongodb://calice:calice@mongo:27017/calice?authSource=admin
    ports:
      - 8000