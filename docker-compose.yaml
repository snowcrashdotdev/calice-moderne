services:
  mongo:
    image: mongo
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: calice
      MONGO_INITDB_ROOT_PASSWORD: calice
      MONGO_INITDB_DATABASE: calice
    ports:
      - 27017
  nginx:
    image: nginx:stable-alpine
    depends_on:
      - sveltekit
      - fastapi
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - 9000:80
      - 3001:3001
  sveltekit:
    build: .
    depends_on:
      - fastapi
    ports:
      - 5173
      - 3001
    volumes:
      - ./:/app
      - /app/.sveltekit
      - /app/node_modules
      - /app/.pnpm-store
    command: pnpm dev -- host
  fastapi:
    build:
      dockerfile: api/Dockerfile
      context: .
    depends_on:
      - mongo
    ports:
      - 8000
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: mongodb://calice:calice@mongo:27017/calice?authSource=admin
    command: uvicorn api.index:app --host=0.0.0.0 --port=8000 --reload
volumes:
  mongodb_data:
    driver: local